name: Release bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - name: Package bundle + checksum
        run: |
          VERSION="$(cat dist/bundle/VERSION)"
          ZIP="design-language-${VERSION}.zip"
          ( cd dist/bundle && zip -r "../${ZIP}" . )
          ( cd dist && sha256sum "${ZIP}" > "${ZIP}.sha256" )
          ls -l "dist/${ZIP}" "dist/${ZIP}.sha256"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/design-language-*.zip
            dist/design-language-*.zip.sha256
