name: Release bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The zip name + bundle VERSION come from package.json; the release is
      # named by the tag. Fail fast if they disagree so we never ship a bundle
      # labelled with a different version than the tag/release.
      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != package.json version ${PKG}. Use \`npm version\` to bump + tag together."
            exit 1
          fi
          echo "tag matches package.json version: ${PKG}"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Package bundle + checksum
        run: |
          VERSION="$(cat dist/bundle/VERSION)"
          ZIP="design-language-${VERSION}.zip"
          ( cd dist/bundle && zip -r "../${ZIP}" . )
          ( cd dist && sha256sum "${ZIP}" > "${ZIP}.sha256" )
          ls -l "dist/${ZIP}" "dist/${ZIP}.sha256"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/design-language-*.zip
            dist/design-language-*.zip.sha256
